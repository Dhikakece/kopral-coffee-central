<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPRAL POS MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Pastikan overlay menutup seluruh layar dengan benar */
        #start-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <div id="start-overlay" class="fixed inset-0 bg-slate-950 z-[9999] flex items-center justify-center">
        <button onclick="startApp()" id="btn-start-app" class="bg-amber-500 text-slate-950 font-bold px-10 py-4 rounded-2xl animate-pulse shadow-2xl text-lg flex items-center gap-3">
            <i class="fas fa-play"></i>
            <span>MULAI APLIKASI KASIR</span>
        </button>
    </div>

    <div class="fixed bottom-4 right-4 pointer-events-none opacity-20 hover:opacity-100 transition-opacity duration-500 z-50">
        <div class="text-[10px] font-black uppercase tracking-widest text-white bg-slate-800/60 px-2 py-1 rounded shadow-lg animate-pulse backdrop-blur-sm border border-slate-700">
            Created by CyberPapsel
        </div>
    </div>

    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-base font-bold text-white">KOPRAL <span class="text-amber-400">POS MONITOR</span></h1>
        <button onclick="toggleModal(true)" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-xs font-bold transition">
            <i class="fas fa-cog mr-1"></i> Pengaturan & Riwayat
        </button>
    </header>

    <div id="modal" class="fixed inset-0 bg-slate-950/90 z-50 hidden p-4 overflow-y-auto">
        <div class="max-w-xl mx-auto bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-white">Pengaturan & Riwayat</h2>
                <button onclick="toggleModal(false)" class="text-slate-400 text-xl">✕</button>
            </div>
            <div class="space-y-6">
                <div class="flex items-center justify-between p-4 bg-slate-900 rounded-xl">
                    <span class="font-medium text-sm">Notifikasi Suara</span>
                    <button id="toggle-sound" onclick="toggleSound()" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">Aktif</button>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-slate-400">Riwayat Pesanan</h3>
                        <div class="flex gap-2">
                            <input type="date" id="search-date" onchange="filterRiwayat()" class="bg-slate-700 text-white text-[10px] px-2 py-1 rounded-lg border border-slate-600">
                            <button onclick="tampilkanLaporan()" class="text-[10px] bg-amber-600/20 text-amber-400 px-3 py-1 rounded-lg border border-amber-900">Laporan</button>
                            <button onclick="clearSelesai()" class="text-[10px] bg-red-600/20 text-red-400 px-3 py-1 rounded-lg border border-red-900">Bersihkan</button>
                        </div>
                    </div>
                    <div id="container-riwayat" class="space-y-2 max-h-60 overflow-y-auto pr-2 text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="p-6 max-w-7xl mx-auto">
        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
            <i class="fas fa-receipt text-amber-400"></i> Antrean Aktif
        </h2>
        <div id="container-antrean" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="pesan-kosong" class="col-span-full text-center py-20 text-slate-500">Belum ada pesanan masuk.</div>
        </div>
    </main>

    <audio id="notif-sound" src="https://kopral-coffee-central.onrender.com/notification.mp3" preload="auto"></audio>

    <script>
        let socket;
        let isSoundEnabled = true;

        // --- PENTING: FUNGSI INI MENGATASI MASALAH STUCK ---
        async function startApp() {
            const btn = document.getElementById('btn-start-app');
            btn.innerText = 'Menghubungkan...';
            btn.classList.remove('animate-pulse');
            btn.style.opacity = '0.5';

            try {
                // 1. Inisialisasi Audio (Membuka Izin)
                const audio = document.getElementById('notif-sound');
                await audio.play();
                audio.pause();
                audio.currentTime = 0;
                console.log("Audio diinisialisasi");

                // 2. Inisialisasi Socket.io
                if (!socket) {
                    socket = io("https://kopral-coffee-central.onrender.com");
                    
                    socket.on('connect', () => {
                        console.log("Socket terhubung:", socket.id);
                    });

                    socket.on('connect_error', (err) => {
                        console.error("Koneksi Socket Gagal:", err);
                    });

                    // Pindahkan logika socket.on di sini agar aktif setelah tombol diklik
                    socket.on('notifikasi-pesanan-baru', (pesanan) => {
                        handleNewOrder(pesanan);
                    });
                }

                // 3. Sembunyikan Overlay
                document.getElementById('start-overlay').style.display = 'none';
            } catch (err) {
                console.error("Error saat inisialisasi:", err);
                // TAMPILKAN ALERT JIKA ERROR AGAR TAHU PENYEBABNYA
                alert("Gagal terhubung ke server: " + err.message + ". Silakan coba lagi atau refresh aplikasi.");
                // TETAP SEMBUNYIKAN OVERLAY AGAR APLIKASI TIDAK STUCK GELAP
                document.getElementById('start-overlay').style.display = 'none';
            } finally {
                // Kembalikan tombol ke kondisi awal (opsional)
                btn.innerText = 'MULAI APLIKASI KASIR';
                btn.style.opacity = '1';
            }
        }

        function handleNewOrder(pesanan) {
            if (isSoundEnabled) {
                const audio = document.getElementById('notif-sound');
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Gagal memutar suara notifikasi:", e));
            }
            
            document.getElementById('pesan-kosong').classList.add('hidden');
            const totalHarga = pesanan.items.reduce((acc, i) => acc + ((parseFloat(i.price) || 0) * (parseInt(i.quantity) || 0)), 0);
            const div = document.createElement('div');
            div.id = pesanan.id_pesanan;
            div.className = "bg-slate-800 border border-slate-700 p-4 rounded-2xl shadow-xl animate-pulse";
            div.innerHTML = `
                <div class="flex justify-between mb-2">
                    <span class="bg-amber-400 text-slate-950 text-[9px] font-black px-2 py-0.5 rounded uppercase">${pesanan.metode}</span>
                    <span class="text-xs bg-slate-700 px-2 py-1 rounded font-mono">MEJA ${pesanan.meja}</span>
                </div>
                <h3 class="font-bold text-white mb-3">${pesanan.nama}</h3>
                <div class="my-3 bg-slate-900/40 rounded-xl p-3 text-xs">
                    ${pesanan.items.map(i => `<div class="flex justify-between py-1"><span>${i.name} x${i.quantity}</span><span>Rp ${(i.price*i.quantity).toLocaleString()}</span></div>`).join('')}
                    <div class="border-t border-slate-700 mt-2 pt-2 flex justify-between font-bold text-amber-400 text-sm">
                        <span>TOTAL</span><span>Rp ${totalHarga.toLocaleString()}</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="prosesPesanan('${pesanan.id_pesanan}')" id="btn-p-${pesanan.id_pesanan}" class="bg-amber-500 text-slate-950 text-xs font-bold py-2 rounded-xl">Proses</button>
                    <button onclick="selesaiPesanan('${pesanan.id_pesanan}')" id="btn-s-${pesanan.id_pesanan}" disabled class="bg-slate-700 text-slate-500 text-xs font-bold py-2 rounded-xl cursor-not-allowed">Selesai</button>
                </div>`;
            document.getElementById('container-antrean').prepend(div);
        }

        // --- SISA FUNGSI PENDUKUNG (Sama seperti kode Anda) ---

        function cetakPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const selectedDate = document.getElementById('search-date').value || new Date().toISOString().split('T')[0];
            doc.setFontSize(18);
            doc.text("Laporan Penjualan KOPRAL", 14, 20);
            doc.setFontSize(12);
            doc.text(`Tanggal: ${selectedDate}`, 14, 30);
            const tableData = [];
            Array.from(document.getElementById('container-riwayat').children).forEach(card => {
                const cardTime = parseInt(card.getAttribute('data-time'));
                const cardDate = new Date(cardTime).toISOString().split('T')[0];
                if (cardDate === selectedDate) {
                    card.querySelectorAll('.flex.justify-between.py-1').forEach(item => {
                        const text = item.innerText;
                        tableData.push([text.split('x')[0].trim(), text.split('Rp')[1].trim()]);
                    });
                }
            });
            doc.autoTable({ startY: 40, head: [['Nama Item', 'Harga (Rp)']], body: tableData });
            doc.save(`Laporan_${selectedDate}.pdf`);
        }

        window.onload = () => {
            const savedRiwayat = localStorage.getItem('kopral_riwayat');
            if (savedRiwayat) {
                document.getElementById('container-riwayat').innerHTML = savedRiwayat;
                if (savedRiwayat.trim() !== "") document.getElementById('pesan-kosong').classList.add('hidden');
            }
        };

        function toggleModal(show) { document.getElementById('modal').classList.toggle('hidden', !show); }
        function toggleSound() { isSoundEnabled = !isSoundEnabled; document.getElementById('toggle-sound').innerText = isSoundEnabled ? "Aktif" : "Mati"; }
        
        function filterRiwayat() {
            const selectedDate = document.getElementById('search-date').value;
            const container = document.getElementById('container-riwayat');
            Array.from(container.children).forEach(card => {
                const cardTime = parseInt(card.getAttribute('data-time'));
                if (!cardTime) return;
                const cardDate = new Date(cardTime).toISOString().split('T')[0];
                card.style.display = (!selectedDate || cardDate === selectedDate) ? "block" : "none";
            });
        }

        function tampilkanLaporan() {
            const container = document.getElementById('container-riwayat');
            const selectedDate = document.getElementById('search-date').value || new Date().toISOString().split('T')[0];
            let stats = { "Coffee": { qty: 0, price: 0 }, "Non-Coffee": { qty: 0, price: 0 }, "Snack": { qty: 0, price: 0 } };
            Array.from(container.children).forEach(card => {
                const cardTime = parseInt(card.getAttribute('data-time'));
                if (!cardTime) return;
                const cardDate = new Date(cardTime).toISOString().split('T')[0];
                if (cardDate === selectedDate) {
                    const items = card.querySelectorAll('.flex.justify-between.py-1');
                    const totalMatch = card.querySelector('.text-amber-400 span:last-child');
                    const totalHargaCard = totalMatch ? parseInt(totalMatch.innerText.replace(/[^0-9]/g, '')) : 0;
                    items.forEach(item => {
                        const text = item.innerText;
                        let category = "Snack";
                        if (text.match(/Kopi|Latte|Espresso|Americano/i)) category = "Coffee";
                        else if (text.match(/Tea|Choco|Matcha|Milk/i)) category = "Non-Coffee";
                        const qtyMatch = text.match(/x(\d+)/);
                        const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
                        stats[category].qty += qty;
                    });
                    stats[Object.keys(stats).
