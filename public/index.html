<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPRAL POS MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center shadow-md">
        <h1 class="text-base font-bold text-white">KOPRAL <span class="text-amber-400">POS V2</span></h1>
        <button onclick="toggleModal(true)" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-xs font-bold transition">
            <i class="fas fa-cog mr-1"></i> Pengaturan & Riwayat
        </button>
    </header>

    <div id="modal" class="fixed inset-0 bg-slate-950/90 z-50 hidden p-4 overflow-y-auto">
        <div class="max-w-2xl mx-auto bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">Pengaturan & Riwayat</h2>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-white text-xl">✕</button>
            </div>
            
            <div class="space-y-6">
                <div class="flex items-center justify-between p-4 bg-slate-900 rounded-xl">
                    <span class="font-medium">Notifikasi Suara</span>
                    <button id="toggle-sound" onclick="toggleSound()" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">Aktif</button>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-slate-400">Riwayat Selesai</h3>
                        <button onclick="clearSelesai()" class="text-[10px] bg-red-600/20 text-red-400 px-3 py-1 rounded-lg border border-red-900 hover:bg-red-600 hover:text-white transition">
                            <i class="fas fa-trash mr-1"></i> Hapus Semua Riwayat
                        </button>
                    </div>
                    <div id="container-riwayat" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="p-6 max-w-7xl mx-auto">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fas fa-receipt text-amber-400"></i> Antrean Aktif
            <span id="order-count" class="bg-amber-500 text-slate-950 text-xs px-2 py-0.5 rounded-full">0</span>
        </h2>
        <div id="container-antrean" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="pesan-kosong" class="col-span-full text-center py-20 text-slate-500">Belum ada pesanan masuk.</div>
        </div>
    </main>

    <audio id="notif-sound" src="notification.mp3" preload="auto"></audio>

    <script>
        const socket = io("https://kopral-coffee-central.onrender.com");
        let isSoundEnabled = true;

        function toggleModal(show) { document.getElementById('modal').classList.toggle('hidden', !show); }

        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById('toggle-sound');
            btn.innerText = isSoundEnabled ? "Aktif" : "Mati";
            btn.className = isSoundEnabled ? "bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold" : "bg-slate-600 px-4 py-2 rounded-lg text-xs font-bold";
        }

        socket.on('notifikasi-pesanan-baru', (pesanan) => {
            if (isSoundEnabled) document.getElementById('notif-sound').play().catch(()=>{});
            document.getElementById('pesan-kosong').classList.add('hidden');
            
            const div = document.createElement('div');
            div.id = pesanan.id_pesanan;
            div.className = "bg-slate-800 border border-slate-700 p-4 rounded-2xl animate-pulse";
            div.innerHTML = `<h3 class="font-bold">${pesanan.nama} - Meja ${pesanan.meja}</h3>
                             <button onclick="selesaiPesanan('${pesanan.id_pesanan}')" class="mt-3 bg-emerald-600 w-full py-2 rounded-lg text-xs font-bold">Selesai</button>`;
            document.getElementById('container-antrean').prepend(div);
            updateCount(1);
        });

        function selesaiPesanan(id) {
            const card = document.getElementById(id);
            const riwayat = document.getElementById('container-riwayat');
            card.classList.remove('animate-pulse');
            card.querySelector('button').remove();
            riwayat.prepend(card);
            updateCount(-1);
        }

        function updateCount(val) {
            const el = document.getElementById('order-count');
            el.innerText = parseInt(el.innerText) + val;
        }

        function clearSelesai() {
            if(confirm('Hapus semua riwayat?')) document.getElementById('container-riwayat').innerHTML = '';
        }
    </script>
</body>
</html>
