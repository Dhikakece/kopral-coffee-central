<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPRAL COFFEE - Android & Web POS Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen select-none">

    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <h1 class="text-base font-bold tracking-wider text-white">KOPRAL POS <span class="text-amber-400">MONITOR</span></h1>
        </div>
        <div class="text-xs font-mono text-slate-400" id="live-clock">00:00:00 WIB</div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-receipt text-amber-400"></i> Antrean Pesanan Masuk
                <span id="order-count" class="bg-amber-500 text-slate-950 text-xs font-black px-2.5 py-1 rounded-full ml-2">0</span>
            </h2>
            <button onclick="clearSelesai()" class="text-xs bg-slate-800 border border-slate-700 px-3 py-2 rounded-xl hover:bg-slate-700 transition">
                <i class="fas fa-check-double mr-1"></i> Bersihkan Selesai
            </button>
        </div>

        <div id="container-antrean" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="pesan-kosong" class="col-span-full text-center py-20 text-slate-500">
                <i class="fas fa-coffee text-5xl mb-3 block"></i>
                <p class="text-base font-medium">Belum ada pesanan masuk.</p>
                <p class="text-xs">Sistem stand-by memantau jaringan cloud internet...</p>
            </div>
        </div>
    </main>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav" preload="auto"></audio>

    <script>
        // ========================================================
        // SUDAH DIUBAH: Menggunakan nama project Render Anda yang aktif
        // ========================================================
        const RENDER_PROJECT_NAME = "kopral-coffee-central";

        // Deteksi otomatis: Jika dibuka lokal pakai localhost, jika di cloud/Android pakai URL Render
        const SERVER_URL = window.location.origin.includes('localhost') || window.location.origin.includes('file://')
            ? "http://localhost:3000"
            : `https://${RENDER_PROJECT_NAME}.onrender.com`;
        
        // Hubungkan WebSocket ke Server Cloud
        const socket = io(SERVER_URL);
        let totalPesanan = 0;

        // Jam Digital Monitor
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('id-ID') + " WIB";
        }, 1000);

        // Menerima Sinyal Notifikasi Pesanan Baru dari Server
        socket.on('notifikasi-pesanan-baru', (pesanan) => {
            // Bunyikan Suara Alert Kasir
            const audio = document.getElementById('notif-sound');
            audio.play().catch(e => console.log("Izin audio browser aktif"));

            document.getElementById('pesan-kosong').classList.add('hidden');
            totalPesanan++;
            document.getElementById('order-count').innerText = totalPesanan;

            const container = document.getElementById('container-antrean');
            
            let itemsHTML = '';
            pesanan.items.forEach(item => {
                itemsHTML += `
                    <div class="flex justify-between border-b border-slate-700/40 py-2 text-sm">
                        <span class="text-slate-300">${item.name} <span class="text-amber-400 font-bold">x${item.quantity}</span></span>
                        <span class="font-bold">Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</span>
                    </div>
                `;
            });

            const cardHTML = `
                <div id="${pesanan.id_pesanan}" class="bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-xl flex flex-col justify-between transition-all duration-300 animate-pulse">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="bg-amber-400 text-slate-950 text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-wider">${pesanan.metode}</span>
                                <h3 class="text-base font-bold text-white mt-1">${pesanan.nama}</h3>
                            </div>
                            <span class="text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded-md font-mono">MEJA ${pesanan.meja}</span>
                        </div>
                        <div class="my-3 bg-slate-900/40 rounded-xl p-3">
                            ${itemsHTML}
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs text-slate-400">Total:</span>
                            <span class="text-base font-black text-emerald-400">Rp ${pesanan.total.toLocaleString('id-ID')}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="prosesPesanan('${pesanan.id_pesanan}')" id="btn-proses-${pesanan.id_pesanan}" class="bg-amber-500 text-slate-950 text-xs font-bold py-2.5 rounded-xl">
                                <i class="fas fa-fire mr-1"></i> Proses
                            </button>
                            <button onclick="selesaiPesanan('${pesanan.id_pesanan}')" id="btn-selesai-${pesanan.id_pesanan}" disabled class="bg-slate-700 text-slate-500 text-xs font-bold py-2.5 rounded-xl cursor-not-allowed">
                                <i class="fas fa-check mr-1"></i> Selesai
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', cardHTML);
        });

        function prosesPesanan(id) {
            const card = document.getElementById(id);
            card.classList.remove('animate-pulse');
            card.classList.add('border-blue-500');
            
            const btnProses = document.getElementById(`btn-proses-${id}`);
            btnProses.innerHTML = `Dibuat...`;
            btnProses.className = "bg-blue-600 text-white text-xs font-bold py-2.5 rounded-xl cursor-not-allowed";
            btnProses.disabled = true;

            const btnSelesai = document.getElementById(`btn-selesai-${id}`);
            btnSelesai.disabled = false;
            btnSelesai.className = "bg-emerald-600 text-white text-xs font-bold py-2.5 rounded-xl";
        }

        function selesaiPesanan(id) {
            const card = document.getElementById(id);
            card.className = "bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-xl flex flex-col justify-between opacity-30 pesanan-selesai";
            document.getElementById(`btn-proses-${id}`)?.remove();
            
            const btnSelesai = document.getElementById(`btn-selesai-${id}`);
            btnSelesai.innerHTML = `<i class="fas fa-check"></i> Selesai`;
            btnSelesai.className = "bg-slate-700 text-slate-400 text-xs font-bold py-2.5 rounded-xl col-span-2";
            btnSelesai.disabled = true;

            totalPesanan--;
            document.getElementById('order-count').innerText = totalPesanan;
        }

        function clearSelesai() {
            document.querySelectorAll('.pesanan-selesai').forEach(card => card.remove());
            if (document.getElementById('container-antrean').children.length === 1) {
                document.getElementById('pesan-kosong').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
