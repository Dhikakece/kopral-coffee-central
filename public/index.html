<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOPRAL POS MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        html, body { overscroll-behavior-y: none; }
        #container-riwayat { touch-action: pan-y; overscroll-behavior-y: contain; }
        .badge-order-type { display: inline-block; background-color: #334155; color: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; border: 1px solid #475569; margin-top: 5px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <!-- Modal Bukti Transfer -->
    <div id="modal-bukti" class="fixed inset-0 z-[100] flex items-center justify-center p-2 hidden bg-black/95">
        <button onclick="hideBukti()" class="absolute top-4 right-4 z-[101] text-white w-12 h-12 flex items-center justify-center rounded-full bg-slate-800/50 backdrop-blur shadow-lg border border-slate-600 text-2xl">
            <i class="fas fa-times"></i>
        </button>
        <img id="img-bukti" src="" class="max-w-full max-h-[85vh] object-contain rounded-lg">
        <div class="absolute bottom-4 text-slate-500 text-[10px] uppercase font-bold tracking-widest">Ketuk di luar gambar untuk menutup</div>
        <div onclick="hideBukti()" class="absolute inset-0 z-[99]"></div>
    </div>

    <!-- Overlay Awal -->
    <div id="start-overlay" class="fixed inset-0 bg-slate-950 z-[9999] flex items-center justify-center">
        <button onclick="startApp()" id="btn-start-app" class="bg-amber-500 text-slate-950 font-bold px-10 py-4 rounded-2xl animate-pulse shadow-2xl text-lg">MULAI APLIKASI KASIR</button>
    </div>

    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <h1 class="font-bold text-white">KOPRAL <span class="text-amber-400">POS MONITOR</span></h1>
        <button onclick="toggleModal(true)" class="bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-600 transition">Pengaturan</button>
    </header>

    <!-- Modal Pengaturan -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden transition-all duration-300">
        <div onclick="toggleModal(false)" class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-xl bg-slate-800/90 border border-slate-700/50 rounded-3xl p-6 shadow-[0_20px_50px_rgba(0,0,0,0.5)] backdrop-blur-xl">
            <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                <h2 class="font-bold text-white text-lg flex items-center gap-2"><i class="fas fa-cog text-amber-400"></i> Pengaturan & Riwayat</h2>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Filter Tanggal</label>
                    <input type="date" id="input-tanggal" onchange="filterRiwayat()" class="w-full bg-slate-950 border border-slate-700 text-white p-3 rounded-xl text-sm focus:border-amber-500 outline-none transition-all">
                </div>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="cetakLaporanPDF()" class="bg-blue-600 text-white py-3 rounded-xl text-xs font-bold hover:bg-blue-700 transition"><i class="fas fa-file-pdf mr-2"></i> CETAK PDF</button>
                    <button onclick="downloadCSV()" class="bg-emerald-600 text-white py-3 rounded-xl text-xs font-bold hover:bg-emerald-700 transition"><i class="fas fa-file-csv mr-2"></i> EXPORT CSV (ARSIP)</button>
                    <button onclick="hapusRiwayatManual()" class="bg-red-500/10 border border-red-500/20 text-red-400 py-3 rounded-xl text-xs font-bold hover:bg-red-500/20 transition"><i class="fas fa-trash mr-2"></i> HAPUS RIWAYAT > 30 HARI</button>
                </div>
            </div>
            <div id="container-riwayat" class="mt-6 space-y-3 text-xs max-h-[300px] overflow-y-auto pr-2 custom-scrollbar"></div>
        </div>
    </div>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <h2 class="text-lg font-bold">Antrean Aktif</h2>
            <span class="text-[10px] text-slate-500 font-medium italic border-l border-slate-700 pl-3">Created by CyberPapsel</span>
        </div>
        <div id="container-antrean" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="pesan-kosong" class="col-span-full text-center py-20 text-slate-500">Belum ada pesanan masuk.</div>
        </div>
    </main>

    <audio id="notif-sound" src="https://kopral-coffee-central.onrender.com/notification.mp3" preload="auto"></audio>

    <script>
        let socket;
        let activeOrders = JSON.parse(localStorage.getItem('kopral_active_orders') || '{}');

        window.onload = () => { renderActiveOrders(); };

        function renderActiveOrders() {
            const container = document.getElementById('container-antrean');
            document.querySelectorAll('.group').forEach(el => el.remove());
            const orders = Object.values(activeOrders);
            if (orders.length > 0) {
                document.getElementById('pesan-kosong').classList.add('hidden');
                orders.reverse().forEach(pesanan => { displayOrderUI(pesanan); });
            } else {
                document.getElementById('pesan-kosong').classList.remove('hidden');
            }
        }

        async function startApp() {
            try {
                const audio = document.getElementById('notif-sound');
                await audio.play().catch(() => {}); audio.pause();
                socket = io("https://kopral-coffee-central.onrender.com");
                socket.on('notifikasi-pesanan-baru', (pesanan) => {
                    activeOrders[pesanan.id_pesanan] = pesanan;
                    localStorage.setItem('kopral_active_orders', JSON.stringify(activeOrders));
                    renderActiveOrders();
                    document.getElementById('notif-sound').play().catch(() => {});
                });
                document.getElementById('start-overlay').style.display = 'none';
            } catch (err) { alert("Gagal terhubung"); }
        }

        function displayOrderUI(pesanan) {
            const totalHarga = pesanan.items.reduce((acc, i) => acc + (parseFloat(i.price) * parseInt(i.quantity)), 0);
            const isCash = pesanan.pembayaran === 'Cash';
            const orderTypeLabel = pesanan.metode === 'Dine-In' ? '🍽️ Makan di Tempat' : '🛍️ Bawa Pulang';
            
            const div = document.createElement('div');
            div.id = pesanan.id_pesanan;
            div.className = "group bg-slate-800 border border-slate-700 p-5 rounded-3xl shadow-2xl";
            div.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="font-bold text-white text-lg">${pesanan.nama}</h3>
                        <div class="flex gap-2">
                            <span class="inline-block mt-1 bg-amber-500/10 text-amber-500 text-[10px] font-bold px-3 py-1 rounded-full border border-amber-500/20">MEJA ${pesanan.meja}</span>
                            <span class="inline-block mt-1 badge-order-type">${orderTypeLabel}</span>
                        </div>
                        <div class="mt-2 text-[10px] font-bold ${isCash ? 'text-red-400' : 'text-blue-400'} uppercase">
                             <i class="fas ${isCash ? 'fa-money-bill' : 'fa-credit-card'} mr-1"></i> ${pesanan.pembayaran || 'Transfer'}
                        </div>
                        ${pesanan.nama_pengirim ? `
                            <div class="mt-2 bg-slate-900 border border-blue-500/30 p-2 rounded-lg text-[10px] text-blue-300">
                                <span class="font-bold uppercase">Nama Pemilik Rekening Transfer:</span> ${pesanan.nama_pengirim}
                            </div>
                        ` : ''}
                    </div>
                </div>
                <div class="bg-slate-900/50 rounded-2xl p-4 space-y-2 mb-4">
                    ${pesanan.items.map(i => `
                        <div class="flex flex-col mb-2">
                            <div class="flex justify-between text-sm">
                                <span class="text-slate-300">${i.quantity}x ${i.name}</span>
                                <span class="font-medium text-slate-100">Rp ${Number(i.price).toLocaleString()}</span>
                            </div>
                            ${i.note ? `<span class="text-[10px] text-amber-400 italic mt-0.5">• Catatan: ${i.note}</span>` : ''}
                        </div>
                    `).join('')}
                    <div class="border-t border-slate-700/50 mt-2 pt-2 flex justify-between font-black text-white"><span>TOTAL</span><span>Rp ${totalHarga.toLocaleString()}</span></div>
                </div>
                ${pesanan.bukti_transfer ? `
                    <button onclick="showBukti('${pesanan.bukti_transfer}')" class="w-full mb-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 rounded-xl transition block text-center">
                        <i class="fas fa-image mr-1"></i> LIHAT BUKTI TRANSFER
                    </button>
                ` : ''}
                <div class="grid grid-cols-1 gap-3">
                    ${isCash ? `<button id="btn-bayar-${pesanan.id_pesanan}" onclick="konfirmasiBayar('${pesanan.id_pesanan}')" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold py-3 rounded-2xl transition"><i class="fas fa-hand-holding-usd"></i> KONFIRMASI BAYAR</button>` : ''}
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-proses-${pesanan.id_pesanan}" onclick="prosesPesanan('${pesanan.id_pesanan}')" class="bg-amber-500 hover:bg-amber-600 text-slate-950 text-xs font-bold py-3 rounded-2xl transition"><i class="fas fa-clock"></i> PROSES</button>
                        <button id="btn-selesai-${pesanan.id_pesanan}" ${isCash ? 'disabled class="bg-slate-800 text-slate-600 border border-slate-700 cursor-not-allowed text-xs font-bold py-3 rounded-2xl transition"' : 'onclick="selesaiPesanan(\''+pesanan.id_pesanan+'\')" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-3 rounded-2xl transition"'}>
                            <i class="fas fa-check"></i> SELESAI
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('container-antrean').prepend(div);
        }

        function showBukti(url) {
            const modal = document.getElementById('modal-bukti');
            const img = document.getElementById('img-bukti');
            img.src = url;
            modal.classList.remove('hidden');
        }

        function hideBukti() { 
            document.getElementById('modal-bukti').classList.add('hidden'); 
            document.getElementById('img-bukti').src = "";
        }

        function konfirmasiBayar(id) {
            Swal.fire({
                title: 'Konfirmasi Pembayaran',
                text: "Pastikan pelanggan sudah membayar tunai.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#16a34a',
                confirmButtonText: 'Sudah Bayar'
            }).then((result) => {
                if (result.isConfirmed) {
                    const containerTombol = document.getElementById(`btn-selesai-${id}`).parentElement;
                    const btnBayar = document.getElementById(`btn-bayar-${id}`);
                    document.getElementById(`btn-selesai-${id}`).remove();
                    const btnBaru = document.createElement('button');
                    btnBaru.id = `btn-selesai-${id}`;
                    btnBaru.className = "bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-3 rounded-2xl transition col-span-2";
                    btnBaru.innerHTML = '<i class="fas fa-check"></i> SELESAI';
                    btnBaru.onclick = function() { selesaiPesanan(id); };
                    containerTombol.appendChild(btnBaru);
                    if (btnBayar) btnBayar.style.display = 'none';
                    Swal.fire('Berhasil!', 'Pembayaran dikonfirmasi.', 'success');
                }
            });
        }

        function prosesPesanan(id) {
            const btnProses = document.getElementById(`btn-proses-${id}`);
            const btnSelesai = document.getElementById(`btn-selesai-${id}`);
            document.getElementById(id).classList.add('border-blue-500');
            btnProses.innerHTML = '<i class="fas fa-spinner fa-spin"></i> DIPROSES';
            btnProses.classList.replace('bg-amber-500', 'bg-blue-600');
            btnSelesai.disabled = false;
            btnSelesai.classList.replace('bg-slate-800', 'bg-green-600');
            btnSelesai.classList.replace('text-slate-600', 'text-white');
            btnSelesai.classList.remove('cursor-not-allowed', 'border', 'border-slate-700');
        }

        function selesaiPesanan(id) {
            const card = document.getElementById(id);
            if (card) {
                const cardClone = card.cloneNode(true);
                cardClone.querySelector('.grid')?.remove();
                cardClone.appendChild(Object.assign(document.createElement('div'), {
                    className: "mt-4 pt-4 border-t border-slate-700/50 text-center",
                    innerHTML: `<span class="inline-block bg-green-900/30 text-green-500 text-[10px] font-bold px-4 py-2 rounded-full border border-green-500/20"><i class="fas fa-check-circle mr-2"></i> PESANAN SELESAI</span>`
                }));
                const dataPesanan = {
                    html: cardClone.innerHTML,
                    items: activeOrders[id].items,
                    pembayaran: activeOrders[id].pembayaran,
                    timestamp: new Date().getTime(),
                    tanggal: new Date().toISOString().split('T')[0]
                };
                let riwayat = JSON.parse(localStorage.getItem('kopral_riwayat_data') || '[]');
                riwayat.unshift(dataPesanan);
                localStorage.setItem('kopral_riwayat_data', JSON.stringify(riwayat));
                delete activeOrders[id];
                localStorage.setItem('kopral_active_orders', JSON.stringify(activeOrders));
                card.remove();
                if(Object.keys(activeOrders).length === 0) document.getElementById('pesan-kosong').classList.remove('hidden');
            }
        }

        function cetakLaporanPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const riwayat = JSON.parse(localStorage.getItem('kopral_riwayat_data') || '[]');
            
            if (riwayat.length === 0) { Swal.fire('Oops', 'Data kosong', 'info'); return; }

            const getKategori = (name) => {
                const n = name.toLowerCase();
                if (n.includes('kopi') || n.includes('coffee') || n.includes('espresso') || n.includes('latte') || n.includes('americano') || n.includes('cappuccino')) return 'Coffee';
                const snackKeywords = ['snack', 'food', 'makan', 'gorengan', 'camilan', 'mie', 'nasi', 'fries', 'croissant', 'dimsum', 'toast', 'burger', 'sandwich', 'pastry', 'roti'];
                if (snackKeywords.some(keyword => n.includes(keyword))) return 'Snack & Food';
                return 'Non-Coffee';
            };

            let dataTerstruktur = { 'Coffee': {}, 'Snack & Food': {}, 'Non-Coffee': {} };
            let totalCash = 0;
            let totalTransfer = 0;

            riwayat.forEach(r => {
                const subtotalOrder = r.items.reduce((acc, i) => acc + (parseFloat(i.price) * parseInt(i.quantity)), 0);
                if (r.pembayaran === 'Cash') totalCash += subtotalOrder;
                else totalTransfer += subtotalOrder;
                r.items.forEach(i => {
                    const kat = getKategori(i.name);
                    if (!dataTerstruktur[kat]) dataTerstruktur[kat] = {};
                    if (!dataTerstruktur[kat][i.name]) dataTerstruktur[kat][i.name] = { qty: 0, price: i.price };
                    dataTerstruktur[kat][i.name].qty += parseInt(i.quantity);
                });
            });

            doc.setFontSize(16);
            doc.text("LAPORAN PENJUALAN KOPRAL", 14, 15);
            doc.setFontSize(10);
            doc.text(`Total Omzet CASH: Rp ${totalCash.toLocaleString()}`, 14, 25);
            doc.text(`Total Omzet TRANSFER: Rp ${totalTransfer.toLocaleString()}`, 14, 30);
            doc.text(`TOTAL KESELURUHAN: Rp ${(totalCash + totalTransfer).toLocaleString()}`, 14, 35);

            let yPos = 45;
            for (const [kategori, items] of Object.entries(dataTerstruktur)) {
                if(Object.keys(items).length === 0) continue;
                doc.setFontSize(12);
                doc.setFont("helvetica", "bold");
                doc.text(`Kategori: ${kategori}`, 14, yPos);
                yPos += 5;
                let body = Object.keys(items).map(name => [name, items[name].qty, `Rp ${Number(items[name].price).toLocaleString()}`, `Rp ${(items[name].qty * items[name].price).toLocaleString()}`]);
                doc.autoTable({ startY: yPos, head: [['Nama Item', 'Qty', 'Harga', 'Subtotal']], body: body, theme: 'striped', headStyles: { fillColor: [51, 65, 85] } });
                yPos = doc.lastAutoTable.finalY + 10;
            }
            doc.save(`Laporan_Penjualan_${new Date().toISOString().split('T')[0]}.pdf`);
        }

        function downloadCSV() {
            const riwayat = JSON.parse(localStorage.getItem('kopral_riwayat_data') || '[]');
            if (riwayat.length === 0) { Swal.fire('Oops', 'Data kosong', 'info'); return; }
            let csv = "Tanggal,Items,Total\n";
            riwayat.forEach(r => {
                const items = r.items.map(i => `${i.quantity}x ${i.name}`).join(';');
                csv += `${r.tanggal},"${items}",${r.items.reduce((acc, i) => acc + (i.price * i.quantity), 0)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Riwayat_Penjualan_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        function filterRiwayat() {
            const tanggal = document.getElementById('input-tanggal').value;
            const container = document.getElementById('container-riwayat');
            const riwayat = JSON.parse(localStorage.getItem('kopral_riwayat_data') || '[]');
            container.innerHTML = '';
            const filtered = tanggal ? riwayat.filter(i => i.tanggal === tanggal) : riwayat;
            const totalOmzet = filtered.reduce((acc, r) => acc + r.items.reduce((sub, i) => sub + (i.price * i.quantity), 0), 0);
            container.innerHTML = `<div class="bg-amber-500/10 p-4 rounded-xl border border-amber-500/20 mb-4 text-center"><p class="text-amber-500 text-[10px] font-bold uppercase">Total Omzet</p><h3 class="text-white font-black text-xl">Rp ${totalOmzet.toLocaleString()}</h3></div>`;
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-4 rounded-xl border border-slate-700 mb-3";
                div.innerHTML = item.html;
                container.appendChild(div);
            });
        }

        function hapusRiwayatManual() {
            let riwayat = JSON.parse(localStorage.getItem('kopral_riwayat_data') || '[]');
            const batas = new Date(); batas.setDate(batas.getDate() - 30);
            const dataBaru = riwayat.filter(i => new Date(i.timestamp) >= batas);
            if(dataBaru.length === riwayat.length) { Swal.fire('Info', 'Tidak ada riwayat lama (>30 hari) untuk dihapus.', 'info'); return; }
            Swal.fire({ title: 'Hapus Riwayat Lama?', text: "Hanya data > 30 hari yang akan dihapus.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Ya, Hapus!' }).then((result) => {
                if (result.isConfirmed) { localStorage.setItem('kopral_riwayat_data', JSON.stringify(dataBaru)); filterRiwayat(); Swal.fire('Dihapus!', 'Riwayat lama berhasil dibersihkan.', 'success'); }
            });
        }

        function toggleModal(show) { 
            document.getElementById('modal').classList.toggle('hidden', !show); 
            if(show) { document.getElementById('input-tanggal').value = new Date().toISOString().split('T')[0]; filterRiwayat(); } 
        }
    </script>
</body>
</html>
