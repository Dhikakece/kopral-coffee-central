<script>
    const socket = io("https://kopral-coffee-central.onrender.com");
    let isSoundEnabled = true;

    // --- FUNGSI LAPORAN (Fix deteksi Non-Coffee) ---
    function tampilkanLaporan() {
        const container = document.getElementById('container-riwayat');
        const selectedDate = document.getElementById('search-date').value || new Date().toISOString().split('T')[0];
        let stats = { "Coffee": { qty: 0, price: 0 }, "Non-Coffee": { qty: 0, price: 0 }, "Snack": { qty: 0, price: 0 } };

        Array.from(container.children).forEach(card => {
            const cardTime = parseInt(card.getAttribute('data-time'));
            if (!cardTime) return;
            const cardDate = new Date(cardTime).toISOString().split('T')[0];
            
            if (cardDate === selectedDate) {
                const items = card.querySelectorAll('.flex.justify-between.py-1');
                items.forEach(item => {
                    const text = item.innerText;
                    // Ambil harga dan qty dengan regex yang lebih akurat
                    const priceMatch = text.match(/Rp\s?([\d.,]+)/);
                    const price = priceMatch ? parseInt(priceMatch[1].replace(/\./g, '')) : 0;
                    const qtyMatch = text.match(/x(\d+)/);
                    const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
                    
                    let category = "Snack";
                    if (text.match(/Kopi|Latte|Espresso|Americano/i)) category = "Coffee";
                    else if (text.match(/Tea|Choco|Matcha|Milk|Ice/i)) category = "Non-Coffee";
                    
                    stats[category].qty += qty;
                    stats[category].price += price;
                });
            }
        });

        document.getElementById('report-title').innerText = `Laporan: ${selectedDate}`;
        document.getElementById('report-content').innerHTML = `
            ${Object.keys(stats).map(cat => `
                <div class="flex justify-between border-b border-slate-700 pb-2">
                    <span class="font-bold">${cat}</span>
                    <div class="text-right">
                        <div>${stats[cat].qty} Item</div>
                        <div class="text-amber-400 font-mono text-xs">Rp ${stats[cat].price.toLocaleString()}</div>
                    </div>
                </div>
            `).join('')}
            <div class="flex justify-between pt-4 text-lg font-black text-white">
                <span>TOTAL</span>
                <span>Rp ${(stats.Coffee.price + stats['Non-Coffee'].price + stats.Snack.price).toLocaleString()}</span>
            </div>
        `;
        document.getElementById('report-modal').classList.remove('hidden');
    }

    // --- FUNGSI CETAK PDF (Grouping Item Sama) ---
    function cetakPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const selectedDate = document.getElementById('search-date').value || new Date().toISOString().split('T')[0];
        
        let consolidated = {}; // Objek untuk menampung total per item

        Array.from(document.getElementById('container-riwayat').children).forEach(card => {
            const cardTime = parseInt(card.getAttribute('data-time'));
            if (cardTime && new Date(cardTime).toISOString().split('T')[0] === selectedDate) {
                card.querySelectorAll('.flex.justify-between.py-1').forEach(item => {
                    const text = item.innerText;
                    const parts = text.split('x');
                    const name = parts[0].trim();
                    const qty = parseInt(parts[1]) || 1;
                    const price = parseInt(text.split('Rp')[1].replace(/[^0-9]/g, ''));

                    if (!consolidated[name]) {
                        consolidated[name] = { qty: 0, total: 0, unitPrice: price / qty };
                    }
                    consolidated[name].qty += qty;
                    consolidated[name].total += price;
                });
            }
        });

        const tableBody = Object.keys(consolidated).map(name => [
            name, 
            consolidated[name].qty, 
            `Rp ${consolidated[name].unitPrice.toLocaleString()}`, 
            `Rp ${consolidated[name].total.toLocaleString()}`
        ]);

        doc.setFontSize(18);
        doc.text("Laporan Penjualan KOPRAL", 14, 20);
        doc.setFontSize(12);
        doc.text(`Tanggal: ${selectedDate}`, 14, 30);
        
        doc.autoTable({
            startY: 40,
            head: [['Nama Item', 'Qty', 'Harga Satuan', 'Total']],
            body: tableBody,
        });
        
        doc.save(`Laporan_${selectedDate}.pdf`);
    }

    // --- FUNGSI PENDUKUNG LAINNYA ---
    window.onload = () => {
        const savedRiwayat = localStorage.getItem('kopral_riwayat');
        if (savedRiwayat) {
            document.getElementById('container-riwayat').innerHTML = savedRiwayat;
            if (savedRiwayat.trim() !== "") document.getElementById('pesan-kosong').classList.add('hidden');
        }
    };

    function toggleModal(show) { document.getElementById('modal').classList.toggle('hidden', !show); }
    function toggleSound() { isSoundEnabled = !isSoundEnabled; document.getElementById('toggle-sound').innerText = isSoundEnabled ? "Aktif" : "Mati"; }
    
    function filterRiwayat() {
        const selectedDate = document.getElementById('search-date').value;
        const container = document.getElementById('container-riwayat');
        Array.from(container.children).forEach(card => {
            const cardTime = parseInt(card.getAttribute('data-time'));
            if (!cardTime) return;
            const cardDate = new Date(cardTime).toISOString().split('T')[0];
            card.style.display = (!selectedDate || cardDate === selectedDate) ? "block" : "none";
        });
    }

    function clearSelesai() { document.getElementById('confirm-modal').classList.remove('hidden'); }
    function hideConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }
    
    function executeClear() { 
        const container = document.getElementById('container-riwayat');
        container.innerHTML = "";
        localStorage.removeItem('kopral_riwayat');
        document.getElementById('pesan-kosong').classList.remove('hidden');
        hideConfirm();
    }

    socket.on('notifikasi-pesanan-baru', (pesanan) => {
        if (isSoundEnabled) document.getElementById('notif-sound').play().catch(()=>{});
        document.getElementById('pesan-kosong').classList.add('hidden');
        const totalHarga = pesanan.items.reduce((acc, i) => acc + ((parseFloat(i.price) || 0) * (parseInt(i.quantity) || 0)), 0);
        const div = document.createElement('div');
        div.id = pesanan.id_pesanan;
        div.className = "bg-slate-800 border border-slate-700 p-4 rounded-2xl shadow-xl animate-pulse";
        div.innerHTML = `
            <div class="flex justify-between mb-2">
                <span class="bg-amber-400 text-slate-950 text-[9px] font-black px-2 py-0.5 rounded uppercase">${pesanan.metode}</span>
                <span class="text-xs bg-slate-700 px-2 py-1 rounded font-mono">MEJA ${pesanan.meja}</span>
            </div>
            <h3 class="font-bold text-white mb-3">${pesanan.nama}</h3>
            <div class="my-3 bg-slate-900/40 rounded-xl p-3 text-xs">
                ${pesanan.items.map(i => `<div class="flex justify-between py-1"><span>${i.name} x${i.quantity}</span><span>Rp ${(i.price*i.quantity).toLocaleString()}</span></div>`).join('')}
                <div class="border-t border-slate-700 mt-2 pt-2 flex justify-between font-bold text-amber-400 text-sm">
                    <span>TOTAL</span><span>Rp ${totalHarga.toLocaleString()}</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="prosesPesanan('${pesanan.id_pesanan}')" id="btn-p-${pesanan.id_pesanan}" class="bg-amber-500 text-slate-950 text-xs font-bold py-2 rounded-xl">Proses</button>
                <button onclick="selesaiPesanan('${pesanan.id_pesanan}')" id="btn-s-${pesanan.id_pesanan}" disabled class="bg-slate-700 text-slate-500 text-xs font-bold py-2 rounded-xl cursor-not-allowed">Selesai</button>
            </div>`;
        document.getElementById('container-antrean').prepend(div);
    });

    function prosesPesanan(id) {
        document.getElementById(`btn-p-${id}`).className = "bg-blue-600 text-white text-xs font-bold py-2 rounded-xl cursor-not-allowed";
        document.getElementById(`btn-p-${id}`).innerText = "Dibuat...";
        document.getElementById(`btn-s-${id}`).disabled = false;
        document.getElementById(`btn-s-${id}`).className = "bg-emerald-600 text-white text-xs font-bold py-2 rounded-xl";
    }

    function selesaiPesanan(id) {
        const card = document.getElementById(id);
        card.classList.remove('animate-pulse');
        card.querySelector('.grid').remove();
        const now = new Date();
        card.setAttribute('data-time', now.getTime());
        card.innerHTML += `<div class="mt-3 text-[10px] text-slate-500 font-mono italic">Selesai: ${now.toLocaleString('id-ID')}</div>`;
        document.getElementById('container-riwayat').prepend(card);
        localStorage.setItem('kopral_riwayat', document.getElementById('container-riwayat').innerHTML);
    }
</script>
