<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>KOPRAL POS MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: #1e293b;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 10px;
      }

      html,
      body {
        overscroll-behavior-y: none;
      }

      #container-riwayat {
        touch-action: pan-y;
        overscroll-behavior-y: contain;
      }

      .badge-order-type {
        display: inline-block;
        background-color: #334155;
        color: #e2e8f0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.65rem;
        border: 1px solid #475569;
        margin-top: 5px;
      }

      .app-container {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .logo-watermark {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
      }

      main {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>

  <body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
    <div class="app-container">
      <img src="assets/watermark.png" class="logo-watermark" alt="Logo" />

      <div
        id="modal-bukti"
        class="fixed inset-0 z-[100] flex items-center justify-center p-2 hidden bg-black/95"
      >
        <button
          onclick="hideBukti()"
          class="absolute top-4 right-4 z-[101] text-white w-12 h-12 flex items-center justify-center rounded-full bg-slate-800/50 backdrop-blur shadow-lg border border-slate-600 text-2xl"
        >
          <i class="fas fa-times"></i>
        </button>
        <img
          id="img-bukti"
          src=""
          class="max-w-full max-h-[85vh] object-contain rounded-lg"
        />
        <div
          class="absolute bottom-4 text-slate-500 text-[10px] uppercase font-bold tracking-widest"
        >
          Ketuk di luar gambar untuk menutup
        </div>
        <div onclick="hideBukti()" class="absolute inset-0 z-[99]"></div>
      </div>

      <div
        id="login-form-container"
        class="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm transition-all duration-500"
      >
        <div
          class="bg-slate-900/90 border border-slate-700/50 p-8 rounded-[2rem] w-full max-w-sm shadow-[0_20px_50px_rgba(0,0,0,0.5)] backdrop-blur-xl"
        >
          <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-white tracking-tight">LOGIN</h2>
            <div
              class="mt-2 text-slate-500 font-bold text-[10px] uppercase tracking-[0.2em]"
            >
              Admin <span class="text-amber-500">/</span> Dapur
            </div>
          </div>
          <div class="space-y-4">
            <div>
              <input
                type="text"
                id="input-username"
                placeholder="USERNAME"
                class="w-full bg-slate-950 border border-slate-700 text-white p-4 rounded-2xl outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all placeholder:text-slate-600"
              />
              <p
                id="error-user"
                class="text-red-500 text-[9px] mt-1 ml-2 font-bold hidden opacity-0 transition-opacity"
              >
                * USERNAME : SALAH
              </p>
            </div>
            <div>
              <input
                type="password"
                id="input-password"
                placeholder="PASSWORD"
                class="w-full bg-slate-950 border border-slate-700 text-white p-4 rounded-2xl outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all placeholder:text-slate-600"
              />
              <p
                id="error-pass"
                class="text-red-500 text-[9px] mt-1 ml-2 font-bold hidden opacity-0 transition-opacity"
              >
                * PASSWORD : SALAH
              </p>
            </div>
            <button
              onclick="prosesLogin()"
              class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-4 rounded-2xl mt-4 transition-all transform active:scale-95 shadow-[0_10px_20px_-5px_rgba(245,158,11,0.3)]"
            >
              MASUK
            </button>
            <p
              class="text-center text-slate-600 text-[9px] mt-6 font-bold uppercase tracking-widest"
            >
              ! Isi data dengan benar !
            </p>
          </div>
        </div>
      </div>

      <header
        class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center sticky top-0 z-40"
      >
        <h1 class="font-bold text-white">
          KOPRAL <span class="text-amber-400">POS MONITOR</span>
        </h1>
        <div class="flex items-center gap-4">
          <div
            id="status-koneksi"
            class="flex items-center gap-2 text-[9px] font-bold text-slate-500"
          >
            <span
              id="dot-status"
              class="w-2 h-2 rounded-full bg-slate-600"
            ></span>
            <span id="text-status">OFFLINE</span>
          </div>

          <button
            onclick="toggleModalStok(true)"
            class="bg-amber-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-amber-700 transition text-white"
          >
            <i class="fas fa-boxes mr-1"></i> Stok
          </button>

          <button
            onclick="toggleModal(true)"
            class="bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-600 transition"
          >
            Pengaturan
          </button>
        </div>
      </header>

      <div
        id="start-overlay"
        class="fixed inset-0 bg-slate-950 z-[9999] flex items-center justify-center"
      >
        <button
          onclick="startApp()"
          id="btn-start-app"
          class="bg-amber-500 text-slate-950 font-bold px-10 py-4 rounded-2xl animate-pulse shadow-2xl text-lg"
        >
          MULAI APLIKASI KASIR
        </button>
      </div>

      <div
        id="modal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden transition-all duration-300"
      >
        <div
          onclick="toggleModal(false)"
          class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm"
        ></div>
        <div
          class="relative w-full max-w-xl bg-slate-800/90 border border-slate-700/50 rounded-3xl p-6 shadow-[0_20px_50px_rgba(0,0,0,0.5)] backdrop-blur-xl"
        >
          <div
            class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4"
          >
            <h2 class="font-bold text-white text-lg flex items-center gap-2">
              <i class="fas fa-cog text-amber-400"></i> Pengaturan & Riwayat
            </h2>
            <button
              onclick="toggleModal(false)"
              class="text-slate-400 hover:text-white transition-colors"
            >
              <i class="fas fa-times"></i>
            </button>
          </div>

          <div class="space-y-4">
            <div>
              <label
                class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2"
              >
                Filter Tanggal
              </label>
              <input
                type="date"
                id="input-tanggal"
                onchange="filterRiwayat()"
                class="w-full bg-slate-950 border border-slate-700 text-white p-3 rounded-xl text-sm focus:border-amber-500 outline-none transition-all"
              />
            </div>
            <div class="grid grid-cols-1 gap-2" id="admin-actions">
              <button
                onclick="cetakLaporanPDF()"
                class="bg-blue-600 text-white py-3 rounded-xl text-xs font-bold hover:bg-blue-700 transition"
              >
                <i class="fas fa-file-pdf mr-2"></i> CETAK PDF
              </button>
              <button
                onclick="downloadCSV()"
                class="bg-emerald-600 text-white py-3 rounded-xl text-xs font-bold hover:bg-emerald-700 transition"
              >
                <i class="fas fa-file-csv mr-2"></i> EXPORT CSV (ARSIP)
              </button>
              <button
                onclick="hapusRiwayatManual()"
                class="bg-red-500/10 border border-red-500/20 text-red-400 py-3 rounded-xl text-xs font-bold hover:bg-red-500/20 transition"
              >
                <i class="fas fa-trash mr-2"></i> HAPUS RIWAYAT > 30 HARI
              </button>
            </div>
          </div>
          <div
            id="container-riwayat"
            class="mt-6 space-y-3 text-xs max-h-[300px] overflow-y-auto pr-2 custom-scrollbar"
          ></div>
        </div>
      </div>

      <div
        id="modal-stok"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden transition-all duration-300"
      >
        <div
          onclick="toggleModalStok(false)"
          class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm"
        ></div>
        <div
          class="relative w-full max-w-sm bg-slate-800/90 border border-slate-700/50 rounded-3xl p-6 shadow-2xl backdrop-blur-xl"
        >
          <h2 class="font-bold text-white text-lg mb-4 flex items-center gap-2">
            <i class="fas fa-boxes text-amber-400"></i> Input Stok
          </h2>
          <div class="space-y-4">
            <select
              id="select-produk"
              class="w-full bg-slate-950 border border-slate-700 text-white p-3 rounded-xl text-sm"
            >
              <option value="m01">Pure Matcha Latte</option>
              <option value="m02">Chocolate</option>
            </select>
            <input
              type="number"
              id="input-stok"
              placeholder="Jumlah stok baru..."
              class="w-full bg-slate-950 border border-slate-700 text-white p-3 rounded-xl text-sm"
            />
            <button
              onclick="prosesStok()"
              class="w-full bg-amber-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-amber-700 transition"
            >
              SIMPAN STOK
            </button>
          </div>
        </div>
      </div>

      <main class="w-full p-6 max-w-7xl mx-auto relative z-10">
        <div class="flex items-center gap-3 mb-6">
          <h2 class="text-lg font-bold">Antrean Aktif</h2>
          <span
            class="text-[10px] text-slate-500 font-medium italic border-l border-slate-700 pl-3"
          >
            Created by CyberPapsel
          </span>
        </div>
        <div
          id="container-antrean"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
        >
          <div
            id="pesan-kosong"
            class="col-span-full text-center py-20 text-slate-500"
          >
            Belum ada pesanan masuk.
          </div>
        </div>
      </main>

      <audio
        id="notif-sound"
        src="https://kopral-coffee-central.onrender.com/notification.mp3"
        preload="auto"
      ></audio>
      <audio
        id="warning-sound"
        src="https://kopral-coffee-central.onrender.com/warning.mp3"
        preload="auto"
      ></audio>
    </div>

    <script src="app.js"></script>
  </body>
</html>
